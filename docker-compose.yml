services:
  # ============================================
  # DATABASE SERVICES
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: fastfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fastfix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-FastFix@2026}
      POSTGRES_DB: ${POSTGRES_DB:-fastfix_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - fastfix-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fastfix} -d ${POSTGRES_DB:-fastfix_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: fastfix-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fastfix}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-FastFix@2026}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fastfix_media}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fastfix-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fastfix-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-FastFix@2026} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fastfix-network
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-FastFix@2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # APPLICATION SERVICES
  # ============================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastfix-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-fastfix_db};Username=${POSTGRES_USER:-fastfix};Password=${POSTGRES_PASSWORD:-FastFix@2026}
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER:-fastfix}:${MONGO_PASSWORD:-FastFix@2026}@mongodb:27017/${MONGO_DB:-fastfix_media}?authSource=admin
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-FastFix@2026}
      - Jwt__Secret=${JWT_SECRET:-FastFixSuperSecretKey2026!@#$%^&*()}
      - Jwt__Issuer=FastFix
      - Jwt__Audience=FastFixApp
      - Jwt__ExpiryInMinutes=60
      - AI__ServiceUrl=http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastfix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fastfix-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SIGNALR_URL=http://localhost:5000/hubs
      - VITE_AI_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fastfix-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: fastfix-ai
    restart: unless-stopped
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fastfix}:${POSTGRES_PASSWORD:-FastFix@2026}@postgres:5432/${POSTGRES_DB:-fastfix_db}
      - MONGODB_URL=mongodb://${MONGO_USER:-fastfix}:${MONGO_PASSWORD:-FastFix@2026}@mongodb:27017/${MONGO_DB:-fastfix_media}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-FastFix@2026}@redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      - BACKEND_URL=http://backend:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastfix-network

  # ============================================
  # REVERSE PROXY
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: fastfix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    networks:
      - fastfix-network

# ============================================
# VOLUMES & NETWORKS
# ============================================

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  fastfix-network:
    driver: bridge
